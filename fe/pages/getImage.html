<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр Фото</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            display: flex;
            flex-direction: row;
            width: 90%;
            max-width: 1200px;
            background-color: #1c1c1c;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .left-panel {
            flex: 1;
            padding: 30px;
            border-right: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left-panel img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 5px;
            object-fit: contain;
        }

        .right-panel {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .photo-title {
            font-size: 24px;
            margin: 0;
            color: #fff;
        }

        .photo-info {
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .info-content {
            font-size: 16px;
            color: #fff;
        }

        .comments-section {
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
        }

        .comment {
            margin-bottom: 15px;
            padding: 15px;
            background-color: #333;
            border-radius: 5px;
        }

        .comment-author {
            color: #3897f0;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .comment-text {
            color: #ddd;
            line-height: 1.4;
        }

        .back-btn {
            align-self: flex-start;
            background-color: #3897f0;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }

        .back-btn:hover {
            background-color: #2878c6;
        }

        .error-message {
            color: #ff4444;
            padding: 20px;
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="left-panel">
        <img src="" alt="Загрузка фотографии...">
    </div>

    <div class="right-panel">
        <a href="#" class="back-btn">← Назад</a>
        <h2 class="photo-title"></h2>
        <div class="photo-info"></div>
        <div class="comments-section"></div>
    </div>
</div>
<script src="/app.js"></script>
</body>
</html>
