<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Фотографии</title>
    <style>
        /* Новые стили */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .photo-card {
            background: #2c2c2c;
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-thumbnail {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
        }

        .photo-details {
            padding: 15px 0;
        }

        .detail-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #3897f0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .detail-btn:hover {
            background: #2878c6;
        }

        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .pagination-btn {
            padding: 10px 25px;
            background: #3897f0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .pagination-btn:disabled {
            background: #505050;
            cursor: not-allowed;
        }

        .page-indicator {
            font-size: 18px;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1 class="page-title">Мои Фотографии</h1>
    <div class="gallery-container"></div>
    <div class="pagination-controls">
        <button class="pagination-btn" id="prevPage">Назад</button>
        <span class="page-indicator">Страница <span id="currentPage">1</span></span>
        <button class="pagination-btn" id="nextPage">Вперед</button>
    </div>
</div>
<script src="/my-photos.js"></script>
</body>
</html>
